<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ithaca Group Market Pulse</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand-lockup">
      <div>
        <p class="eyebrow">An AI Codex Project</p>
        <h1>Ithaca Group Market Pulse</h1>
      </div>
    </div>
    <div class="top-actions">
      <div class="theme-switcher" id="themeSwitcher" role="group" aria-label="Color theme">
        <button class="theme-icon-btn" type="button" data-theme-option="light" aria-label="Light theme" title="Light theme">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg>
        </button>
        <button class="theme-icon-btn" type="button" data-theme-option="neutral" aria-label="Neutral theme" title="Neutral theme">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </button>
        <button class="theme-icon-btn" type="button" data-theme-option="dark" aria-label="Dark theme" title="Dark theme">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 14.8A8.5 8.5 0 0 1 9.2 3a7 7 0 1 0 11.8 11.8Z"></path></svg>
        </button>
      </div>
      <button class="ghost-btn" id="exportBtn" type="button" hidden>Export JSON</button>
      <button class="ghost-btn" id="printBtn" type="button" hidden>Print Brief</button>
    </div>
  </header>

  <main class="shell">
    <section class="news-hero" aria-labelledby="lead-title">
      <div class="hero-copy">
        <p class="eyebrow">Weekly Intelligence Desk</p>
        <h2 id="lead-title">Regional signal watch for Ithaca and associates</h2>
        <p class="hero-standfirst" id="heroStandfirst">Loading the latest saved market brief.</p>
      </div>
      <aside class="scan-panel" aria-label="Scan status">
        <div>
          <span class="panel-label">Status</span>
          <strong id="scanStatus">Idle</strong>
          <div class="scan-meter" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <span id="scanProgressBar"></span>
          </div>
          <span class="scan-progress" id="scanProgress" aria-live="polite">Idle</span>
        </div>
        <div>
          <span class="panel-label">Last updated</span>
          <strong id="lastUpdated">No report yet</strong>
        </div>
        <div>
          <span class="panel-label">Article method</span>
          <strong id="articlePullMethod">Not run yet</strong>
        </div>
        <div>
          <span class="panel-label">Scan window</span>
          <select id="windowSelect" aria-label="Scan window">
            <option value="7" selected>7 days</option>
            <option value="14">14 days</option>
            <option value="30">30 days</option>
          </select>
        </div>
        <button class="primary-btn scan-panel-btn" id="scanBtn" type="button">Refresh</button>
      </aside>
    </section>

    <section class="control-strip" aria-label="Market pulse controls">
      <div class="region-tabs" id="regionTabs"></div>
      <label class="search-box">
        <span>Search</span>
        <input id="searchInput" type="search" placeholder="Company, AI, network, regulation...">
      </label>
    </section>

    <section class="lead-grid" aria-label="Top stories">
      <article class="lead-card" id="leadStory"></article>
      <div class="stat-grid" id="statGrid"></div>
    </section>

    <section class="desk-layout">
      <aside class="brief-rail">
        <div class="rail-section">
          <p class="rail-title">Coverage</p>
          <ul id="coverageList"></ul>
        </div>
        <div class="rail-section">
          <p class="rail-title">Focus Tags</p>
          <div class="tag-cloud" id="tagCloud"></div>
        </div>
      </aside>

      <section class="region-feed" id="regionFeed" aria-label="Regional news feed"></section>
    </section>
  </main>

  <template id="storyTemplate">
    <article class="story-card">
      <div class="story-meta"></div>
      <h3></h3>
      <p></p>
      <a target="_blank" rel="noreferrer">Read source</a>
    </article>
  </template>

  <script src="data/market-snapshot.js"></script>
  <script src="app.js"></script>
</body>
</html>
